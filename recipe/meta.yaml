{% set name = "pysjef" %}
{% set version = "1.45.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/molpro/sjef/archive/refs/tags/{{ version }}.tar.gz
  sha256: 61bcf9baccae99e5ae2340dfef1eb4b37266f02fade1766fa06cd89b2eb7e546


build:
  script:
    - {{ PYTHON }} -m pip install .
    - rm -f $(grep -v /bin/sjef ../cmake-build/install_manifest.txt)  # [unix]
  number: 0

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython >=3.0                                 # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - cmake >=3.14
    - make
    - setuptools-scm >=8.1
    - scikit-build-core >=0.10
  host:
    - python
    - pip
    - libboost-headers >=1.88
    - pugixml >=1.10
    - cython >=3.0
    - setuptools
  run:
    - python
    - lxml >=4.0
    - rsync  # [not win]
    - regex
    - numpy >=1.17
    - m2-base  # [win]

test:
  imports:
    - pysjef
    - pysjef.project
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/molpro/sjef
  summary: |
    Python Simple Job Execution Framework (Pysjef) is pronounced pie-chef
  description: A library that supports the running of any program asynchronously either locally, directly on a remote machine, or via a batch queueing system
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: https://molpro.github.io/pysjef
  dev_url: https://github.com/molpro/sjef

extra:
  recipe-maintainers:
    - pjknowles
    - molpro-owner
